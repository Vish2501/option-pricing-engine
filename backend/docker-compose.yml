services:
  postgres:
    image: postgres:16
    container_name: option-pricing-postgres
    environment:
      POSTGRES_DB: option_pricing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - option_pricing_data:/var/lib/postgresql/data

volumes:
  option_pricing_data:
