services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: option-pricing-api
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/option_pricing
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      API_KEY: local-dev-key
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      PORT: 8080
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16
    container_name: option-pricing-postgres
    environment:
      POSTGRES_DB: option_pricing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - option_pricing_data:/var/lib/postgresql/data

volumes:
  option_pricing_data:
