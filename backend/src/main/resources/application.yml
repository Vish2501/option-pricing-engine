spring:
  application:
    name: option-pricing-backend
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/option_pricing}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

security:
  api-key: ${API_KEY:}

pricing:
  defaults:
    risk-free-rate: 0.05
    monte-carlo-simulations: 10000
    binomial-steps: 500

springdoc:
  swagger-ui:
    path: /swagger-ui.html
