spring:
  application:
    name: option-pricing-backend
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/option_pricing}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:${SERVER_PORT:8080}}

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

security:
  api-key: ${API_KEY:}

pricing:
  defaults:
    risk-free-rate: 0.05
    monte-carlo-simulations: 10000
    binomial-steps: 500

springdoc:
  swagger-ui:
    path: /swagger-ui.html
